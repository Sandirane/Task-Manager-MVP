    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="navbar-collapse collapse" [class.show]="navbarCollapsed()" id="collapsibleNavbar">
    <div class="container-fluid d-flex flex-row align-items-center">
      <ul class="navbar-nav">
        @for (action of actions; track action) {
          <li class="nav-item">
            <button class="btn btn-outline-light ms-1 nav-btn-fixed" [routerLink]="action.route">
              {{ action.title }}
            </button>
          </li>
        }
      </ul>

      <div class="ms-auto">
        <li>
          <button class="btn btn-outline-success nav-btn-fixed" (click)="login()">

          </button>
        </li>
      </div>
    </div>
  </div>
