<nav class="topbar py-3 mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <h4 class="mb-0 fw-bold">Mes tâches</h4>
    <button class="btn btn-primary btn-add" [routerLink]="['/tasks/new']">+ Nouvelle tâche</button>
  </div>
</nav>

<div class="container">
  <app-task-stats
    [totalTasks]="state.tasksResource.value()?.length || 0"
    [displayedTasks]="state.filteredTasks().length"
    [currentPage]="state.page()"
  />

  <div class="card table-card mb-5">
    <div class="card-body">
      <div class="row g-3 align-items-center mb-4">
        <div class="col-12 col-lg-6">
          <div
            class="d-flex flex-column flex-md-row justify-content-lg-end align-items-stretch align-items-md-center gap-2"
          >
            <h5 class="mb-0 me-2">Liste des tâches</h5>
            <div class="flex-grow-1">
              <app-task-search (search)="state.setSearch($event)" />
            </div>

            <select class="form-select" style="max-width: 120px" (change)="changePageSize($event)">
              <option value="3" selected>3</option>
              <option value="5">5</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <app-task-filters
            [sortDirection]="state.sortDirection()"
            (toggleSort)="state.toggleSort()"
            (statusChange)="state.setStatusFilter($event)"
            (priorityChange)="state.setPriorityFilter($event)"
          />
        </div>
      </div>

      @if (state.tasksResource.isLoading()) {
        <div class="text-center py-5">
          <div class="spinner-border"></div>
        </div>
      } @else {
        @if (state.tasksResource.value()?.length) {
          <app-task-table [tasks]="state.paginatedTasks()" (delete)="deleteTask($event)" />

          <div class="mt-4">
            <app-task-pagination
              [page]="state.page()"
              [totalPages]="state.totalPages()"
              (previous)="state.previousPage()"
              (next)="state.nextPage()"
            />
          </div>
        } @else {
          <div class="alert alert-info">Aucune tâche trouvée.</div>
        }
      }
    </div>
  </div>
</div>
