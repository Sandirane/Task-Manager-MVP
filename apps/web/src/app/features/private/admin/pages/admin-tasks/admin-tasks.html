<div class="container-fluid py-4 px-md-5">
  <div class="mb-4">
    <h1 class="h3 text-dark fw-bold mb-1">Tableau de bord des tâches</h1>
    <p class="text-muted small mb-0">
      Gestion, filtrage et modération de l'ensemble des tâches de la plateforme.
    </p>
  </div>

  <app-admin-filter
    [(search)]="search"
    [(sortDirection)]="sortDirection"
    [totalItems]="filteredTasks().length"
  />

  <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
    <div class="table-responsive">
      <app-admin-table
        [tasks]="paginatedTasks()"
        [isLoading]="tasksResource.isLoading()"
        (deleteRequest)="openDeleteConfirmation($event)"
      />
    </div>

    @if (!tasksResource.isLoading() && filteredTasks().length > 0) {
      <app-admin-pagination
        [(page)]="page"
        [(pageSize)]="pageSize"
        [totalPages]="totalPages()"
        [pageSizeOptions]="pageSizeOptions"
      />
    }
  </div>
</div>

<app-confirm-modal
  [isOpen]="isModalOpen()"
  title="Supprimer la tâche"
  message="Attention, cette action est irréversible. Êtes-vous sûr de vouloir supprimer cette tâche ?"
  (confirm)="confirmDelete()"
  (cancel)="closeModal()"
/>
