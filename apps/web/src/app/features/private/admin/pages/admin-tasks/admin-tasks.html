<div class="container mt-5">
  <div class="card shadow-sm border-0 rounded-3">
    <div class="card-header bg-white border-bottom-0 pt-4 px-4">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-4">
          <h2 class="h4 text-dark mb-0 fw-bold">Toutes les tâches</h2>
        </div>

        <div class="col-12 col-md-5">
          <div class="input-group input-group-merge border rounded-pill px-3 py-1 bg-light">
            <span class="text-muted me-2">🔍</span>
            <input
              type="text"
              class="form-control border-0 bg-transparent p-0 shadow-none"
              placeholder="Rechercher une tâche..."
              [value]="search()"
              (input)="onSearch($event)"
            />
          </div>
        </div>

        <div class="col-12 col-md-3 text-md-end">
          <button class="btn btn-outline-primary btn-sm rounded-pill px-3" (click)="toggleSort()">
            <span class="me-1">Sort:</span>
            <strong>{{ sortDirection() === 'asc' ? 'A-Z ↑' : 'Z-A ↓' }}</strong>
          </button>
        </div>
      </div>
    </div>

    <div class="card-body p-0 mt-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light text-uppercase fs-7 text-muted border-bottom">
            <tr>
              <th class="ps-4 py-3">Titre</th>
              <th class="py-3">Statut</th>
              <th class="py-3">Priorité</th>
              <th class="py-3">Utilisateur</th>
              <th class="py-3">Créée le</th>
              <th class="pe-4 py-3 text-end">Actions</th>
            </tr>
          </thead>

          <tbody>
            @for (task of filteredTasks(); track task.id) {
              <tr class="border-bottom-0">
                <td class="ps-4 py-3 fw-semibold text-dark">{{ task.title }}</td>

                <td class="py-3">
                  <span class="badge bg-success-subtle text-success rounded-pill px-2.5 py-1.5">
                    {{ task.status }}
                  </span>
                </td>

                <td class="py-3">
                  <span class="badge bg-secondary-subtle text-secondary rounded-pill px-2.5 py-1.5">
                    {{ task.priority }}
                  </span>
                </td>

                <td class="py-3 text-secondary">
                  <div class="d-flex align-items-center">
                    <div
                      class="avatar-placeholder bg-light text-primary rounded-circle d-flex align-items-center justify-content-center me-2"
                      style="width: 28px; height: 28px; font-size: 11px; font-weight: bold"
                    >
                      U
                    </div>
                    <small class="fw-medium">{{ task.username }}</small>
                  </div>
                </td>

                <td class="py-3 text-muted fs-7">
                  {{ task.createdAt | date: 'dd MMM yyyy' }}
                </td>

                <td class="pe-4 py-3 text-end">
                  <button
                    class="btn btn-sm btn-link text-danger p-0 border-0 text-decoration-none fw-medium"
                    (click)="deleteTask(task.id)"
                  >
                    Supprimer
                  </button>
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="6" class="text-center py-5 text-muted">
                  <p class="mb-0 fs-5">Aucune tâche trouvée</p>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
