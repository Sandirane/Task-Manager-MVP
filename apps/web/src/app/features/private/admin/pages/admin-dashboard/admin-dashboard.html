<div class="container mt-4">
  <div
    class="p-4 rounded-4 bg-light bg-opacity-75 border border-white shadow-sm mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 header-blur"
  >
    <div>
      <h2 class="fw-bold text-dark m-0 mt-1">Dashboard Admin</h2>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 w-100 w-md-auto">
      <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill"
        >Vue d'ensemble</span
      >
      <a
        routerLink="/admin/tasks"
        class="btn btn-sm btn-outline-primary rounded-pill px-3 text-nowrap"
      >
        <i class="bi bi-person-gear me-1"></i> Gérer toutes les tâches
      </a>
      <!--
      
      <a
        routerLink="/admin/users"
        class="btn btn-sm btn-outline-primary rounded-pill px-3 text-nowrap"
      >
        <i class="bi bi-people-fill me-1"></i> Gérer les utilisateurs
      </a>
      -->
    </div>
  </div>

  @if (statsResource.isLoading()) {
    <div class="d-flex justify-content-center align-items-center my-5">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
  } @else {
    @let stats = statsResource.value();

    <div class="row g-4 mb-4">
      <div class="col-12">
        <div class="card border-0 bg-primary bg-gradient text-white shadow-sm dashboard-card">
          <div class="card-body p-4 d-flex justify-content-between align-items-center">
            <div>
              <div class="text-white-50 text-uppercase fw-bold small mb-1">Total des tâches</div>
              <h1 class="display-5 fw-bold m-0">{{ stats?.totalTasks }}</h1>
            </div>
            <div class="bg-white bg-opacity-25 rounded-circle p-3">
              <i class="bi bi-layers-fill fs-1"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6 col-xl-3">
        <app-dashboard-card
          title="À faire"
          [value]="stats?.todoTasks"
          icon="bi-list-task"
          color="secondary"
        />
      </div>

      <div class="col-md-6 col-xl-3">
        <app-dashboard-card
          title="En cours"
          [value]="stats?.inProgressTasks"
          icon="bi-hourglass-split"
          color="warning"
        />
      </div>

      <div class="col-md-6 col-xl-3">
        <app-dashboard-card
          title="Terminées"
          [value]="stats?.doneTasks"
          icon="bi-check2-circle"
          color="success"
        />
      </div>

      <div class="col-md-6 col-xl-3">
        <app-dashboard-card
          title="Priorité Haute"
          [value]="stats?.highPriorityTasks"
          icon="bi-exclamation-triangle"
          color="danger"
        />
      </div>
    </div>
  }
</div>
